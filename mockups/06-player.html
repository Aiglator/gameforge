<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GameForge — Lecteur</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020408;--sc:#141b2b;--sh:#1c2538;--secondary:#4edea3;--primary:#adc6ff;--on:#dce2f8;--onv:#8b98b4;--muted:#64748b}
body{background:var(--bg);color:var(--on);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.ms{font-family:'Material Symbols Outlined';font-size:18px;line-height:1;vertical-align:middle}

/* TOP BAR */
.topbar{height:44px;background:rgba(20,27,43,.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:10}
.back-btn{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--onv);text-transform:uppercase;letter-spacing:2px;cursor:pointer;padding:6px 10px;transition:color .15s;background:none;border:none}
.back-btn:hover{color:var(--on)}
.game-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--on)}
.spacer{flex:1}
.ctrl-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--onv);padding:6px 10px;font-size:9px;cursor:pointer;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:1px;transition:all .15s}
.ctrl-btn:hover{background:rgba(255,255,255,.1);color:var(--on)}
.ctrl-btn.active{background:rgba(78,222,163,.1);border-color:var(--secondary);color:var(--secondary)}
.playing-badge{background:rgba(78,222,163,.1);border:1px solid rgba(78,222,163,.3);color:var(--secondary);font-size:8px;padding:4px 10px;text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:4px}
.playing-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--secondary);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* GAME FRAME */
.game-frame{flex:1;position:relative;background:#020408;display:flex;align-items:center;justify-content:center}
.game-inner{width:100%;height:100%;background:linear-gradient(135deg,#020408 0%,#050d1a 100%);position:relative;overflow:hidden}

/* Simulated game screen */
.game-screen{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative}
.platform{position:absolute;background:#1c2538;border-top:3px solid #4edea3}
.player{position:absolute;width:16px;height:22px;background:#adc6ff;border-radius:0}
.enemy{position:absolute;width:18px;height:20px;background:#f87171;border-radius:0}
.coin-el{position:absolute;width:10px;height:10px;border-radius:50%;background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.5)}
.star{position:absolute;width:2px;height:2px;background:rgba(255,255,255,.4);border-radius:50%}
.game-overlay-ui{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:space-between;padding:0 20px}
.hud-left{font-family:'JetBrains Mono',monospace;font-size:12px;color:#4edea3}
.hud-right{font-family:'JetBrains Mono',monospace;font-size:12px;color:#dce2f8}
.hearts{color:#f87171;font-size:14px}
.game-menu-overlay{position:absolute;inset:0;background:rgba(2,4,8,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.menu-title{font-size:28px;font-weight:900;color:#4edea3;letter-spacing:6px;text-transform:uppercase}
.menu-sub{font-size:11px;color:#8b98b4;letter-spacing:2px}
.menu-controls{font-size:10px;color:#64748b;line-height:2;text-align:center;font-family:'JetBrains Mono',monospace}
.menu-btn{background:#4edea3;color:#020408;border:none;padding:10px 32px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:3px;cursor:pointer;font-family:'JetBrains Mono',monospace}

/* BOTTOM STATUS BAR */
.status-bar{height:30px;background:rgba(12,19,34,.9);border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;padding:0 16px;gap:24px;flex-shrink:0}
.status-item{font-size:9px;color:var(--muted);display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace}
.status-item span{color:var(--secondary)}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn">
    <span class="ms" style="font-size:16px">arrow_back</span>
    Retour
  </button>
  <div style="width:1px;height:20px;background:rgba(255,255,255,.1)"></div>
  <div class="game-title">NEXUS RUNNER</div>
  <div class="playing-badge">En jeu</div>
  <div class="spacer"></div>
  <button class="ctrl-btn"><span class="ms" style="font-size:16px">volume_up</span>Son</button>
  <button class="ctrl-btn"><span class="ms" style="font-size:16px">speed</span>60fps</button>
  <button class="ctrl-btn"><span class="ms" style="font-size:16px">share</span>Partager</button>
  <button class="ctrl-btn active"><span class="ms" style="font-size:16px">fullscreen</span>Plein écran</button>
</div>

<div class="game-frame">
  <div class="game-inner">
    <div class="game-screen">

      <!-- Simulated stars -->
      <div class="star" style="left:5%;top:10%"></div><div class="star" style="left:15%;top:25%"></div>
      <div class="star" style="left:30%;top:8%"></div><div class="star" style="left:50%;top:18%"></div>
      <div class="star" style="left:65%;top:30%"></div><div class="star" style="left:80%;top:12%"></div>
      <div class="star" style="left:90%;top:22%"></div><div class="star" style="left:42%;top:35%"></div>

      <!-- Ground platform -->
      <div class="platform" style="left:0;right:0;bottom:60px;height:20px"></div>

      <!-- Elevated platforms -->
      <div class="platform" style="left:20%;width:15%;bottom:130px;height:12px"></div>
      <div class="platform" style="left:45%;width:12%;bottom:170px;height:12px;border-top-color:#3b82f6"></div>
      <div class="platform" style="left:70%;width:18%;bottom:140px;height:12px"></div>

      <!-- Player -->
      <div class="player" style="left:18%;bottom:82px"></div>

      <!-- Enemies -->
      <div class="enemy" style="left:55%;bottom:82px"></div>
      <div class="enemy" style="left:72%;bottom:152px"></div>

      <!-- Coins -->
      <div class="coin-el" style="left:25%;bottom:155px"></div>
      <div class="coin-el" style="left:48%;bottom:195px"></div>
      <div class="coin-el" style="left:51%;bottom:195px"></div>
      <div class="coin-el" style="left:75%;bottom:165px"></div>

      <!-- HUD -->
      <div class="game-overlay-ui">
        <div class="hud-left">SCORE: 280</div>
        <div class="hud-right"><span class="hearts">♥♥♡</span></div>
      </div>

      <!-- Distance -->
      <div style="position:absolute;bottom:8px;right:16px;font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.2)">28m</div>

      <!-- GAME MENU OVERLAY (shown for demo) -->
      <div class="game-menu-overlay">
        <div class="menu-title">NEXUS RUNNER</div>
        <div class="menu-sub">Platformer 2D infini · Construit avec Canvas API</div>
        <div class="menu-controls">
          [←][→] ou [A][D] — Déplacer<br/>
          [↑] ou [W] ou [ESPACE] — Sauter<br/>
          [R] — Recommencer
        </div>
        <button class="menu-btn">JOUER</button>
      </div>

    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-item"><span class="ms" style="font-size:12px">games</span>Nexus Runner</div>
  <div class="status-item">Moteur : <span>Canvas 2D API</span></div>
  <div class="status-item">Framerate : <span>60fps</span></div>
  <div class="status-item">Résolution : <span>480×270</span></div>
  <div class="status-item">Joueurs : <span>0</span></div>
  <div style="flex:1"></div>
  <div class="status-item"><span class="ms" style="font-size:12px;color:var(--secondary)">public</span>GameForge Marketplace</div>
</div>

</body>
</html>
