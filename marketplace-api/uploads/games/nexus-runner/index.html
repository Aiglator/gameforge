<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020408; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; image-rendering: pixelated; }
    #ui { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(0,0,0,0.5); color: #4edea3; font-size: 13px; font-family: 'Courier New', monospace; pointer-events: none; }
    #screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(2,4,8,0.92); color: #dce2f8; text-align: center; }
    #screen.hidden { display: none; }
    #screen h1 { font-size: 32px; color: #4edea3; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 8px; }
    #screen p { font-size: 12px; color: #8b98b4; margin: 4px 0; letter-spacing: 2px; }
    #screen .controls { margin: 20px 0; font-size: 11px; color: #64748b; line-height: 2; }
    #screen button { margin-top: 16px; background: #4edea3; color: #020408; border: none; padding: 10px 32px; font-size: 12px; font-family: 'Courier New', monospace; font-weight: bold; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
    #screen button:hover { background: #3bc48e; }
  </style>
</head>
<body>
  <div id="ui">
    <span>NEXUS RUNNER</span>
    <span id="score-display">SCORE: 0</span>
    <span id="health-display">HP: ♥♥♥</span>
  </div>

  <canvas id="c"></canvas>

  <div id="screen">
    <h1>NEXUS RUNNER</h1>
    <p>A 2D Platformer built with Nexus Engine</p>
    <div class="controls">
      [←][→] or [A][D] — Move<br>
      [↑] or [W] or [SPACE] — Jump<br>
      [R] — Restart
    </div>
    <p id="screen-sub"></p>
    <button id="start-btn">START GAME</button>
  </div>

<script>
// ─── Canvas Setup ────────────────────────────────────────────
const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const W = 480, H = 270
canvas.width = W; canvas.height = H
const scale = Math.min(window.innerWidth / W, window.innerHeight / H)
canvas.style.width  = (W * scale) + 'px'
canvas.style.height = (H * scale) + 'px'

// ─── Input ───────────────────────────────────────────────────
const keys = {}
window.addEventListener('keydown', e => { keys[e.key] = true; keys[e.code] = true })
window.addEventListener('keyup',   e => { keys[e.key] = false; keys[e.code] = false })

// ─── Constants ───────────────────────────────────────────────
const GRAVITY    = 0.45
const JUMP_FORCE = -9.5
const SPEED      = 2.8
const TILE       = 16
const COLORS = {
  sky1: '#050d1a', sky2: '#0a1628',
  ground: '#1c2538', groundTop: '#4edea3',
  platform: '#232d42', platformTop: '#3b82f6',
  player: '#adc6ff', playerEye: '#020408', playerFeet: '#3b82f6',
  enemy: '#f87171', enemyEye: '#020408',
  coin: '#fbbf24', coinGlow: 'rgba(251,191,36,0.3)',
  spike: '#64748b',
  particle: ['#4edea3','#3b82f6','#adc6ff','#fbbf24'],
}

// ─── World ───────────────────────────────────────────────────
class World {
  constructor() {
    this.reset()
  }

  reset() {
    this.scrollX   = 0
    this.score     = 0
    this.distance  = 0
    this.platforms = []
    this.coins     = []
    this.enemies   = []
    this.spikes    = []
    this.particles = []
    this.genX      = 0

    // Starting safe zone
    this.addPlatform(0, H - 40, 200, 20, true)
    this.genX = 200
    for (let i = 0; i < 20; i++) this.generateChunk()
  }

  addPlatform(x, y, w, h, ground = false) {
    this.platforms.push({ x, y, w, h, ground })
  }

  generateChunk() {
    const x = this.genX
    const gapW = 24 + Math.random() * 48
    const platW = 64 + Math.random() * 80
    const platY = H - 40 - Math.random() * 60

    // Ground or elevated platform
    if (Math.random() < 0.5) {
      this.addPlatform(x + gapW, H - 40, platW, 20, true)
      // Spikes on some ground
      if (Math.random() < 0.3) {
        const sp = { x: x + gapW + 8 + Math.random() * (platW - 24), y: H - 48 }
        this.spikes.push(sp)
      }
    } else {
      this.addPlatform(x + gapW, platY, platW, 12)
      this.addPlatform(x + gapW + platW + 16, H - 40, 80, 20, true)
    }

    // Coins
    const numCoins = 1 + Math.floor(Math.random() * 4)
    for (let i = 0; i < numCoins; i++) {
      this.coins.push({
        x: x + gapW + 10 + i * 20 + Math.random() * 10,
        y: platY - 20,
        collected: false,
        bob: Math.random() * Math.PI * 2,
      })
    }

    // Enemy (not in first chunk)
    if (this.genX > 300 && Math.random() < 0.4) {
      const plat = this.platforms[this.platforms.length - 1]
      this.enemies.push({
        x: plat.x + 8,
        y: plat.y - 16,
        w: 14, h: 16,
        vx: (Math.random() < 0.5 ? 1 : -1) * 0.8,
        vy: 0,
        ground: false,
        platRef: plat,
        alive: true,
        hitTimer: 0,
      })
    }

    this.genX += gapW + platW + 16
  }
}

// ─── Player ──────────────────────────────────────────────────
class Player {
  constructor() { this.reset() }

  reset() {
    this.x = 60; this.y = H - 80
    this.w = 12; this.h = 16
    this.vx = 0; this.vy = 0
    this.onGround = false
    this.jumpsLeft = 2
    this.hp = 3
    this.maxHp = 3
    this.invTimer = 0
    this.dead = false
    this.jumpPressed = false
    this.runFrame = 0; this.runTimer = 0
    this.squash = 1
    this.alive = true
  }

  update(world) {
    if (this.dead) return

    // Horizontal input
    const left  = keys['ArrowLeft']  || keys['a'] || keys['A'] || keys['KeyA']
    const right = keys['ArrowRight'] || keys['d'] || keys['D'] || keys['KeyD']
    const jump  = keys['ArrowUp'] || keys['w'] || keys['W'] || keys['Space'] || keys[' ']

    this.vx = (right ? SPEED : 0) - (left ? SPEED : 0)

    // Jump with coyote + double jump
    if (jump && !this.jumpPressed && this.jumpsLeft > 0) {
      this.vy = JUMP_FORCE * (this.jumpsLeft === 2 ? 1 : 0.85)
      this.jumpsLeft--
      this.jumpPressed = true
      this.squash = 0.6
      world.spawnParticles(this.x + this.w/2, this.y + this.h, '#4edea3', 4)
    }
    if (!jump) this.jumpPressed = false

    // Variable jump height
    if (this.vy < 0 && !jump) this.vy *= 0.92

    this.vy += GRAVITY
    if (this.vy > 12) this.vy = 12

    this.x += this.vx
    this.y += this.vy

    this.squash += (1 - this.squash) * 0.2

    // Platform collision
    this.onGround = false
    for (const p of world.platforms) {
      if (this.x + this.w > p.x && this.x < p.x + p.w) {
        // Land on top
        if (this.vy >= 0 && this.y + this.h > p.y && this.y + this.h < p.y + this.h + 8) {
          this.y = p.y - this.h
          this.vy = 0
          this.onGround = true
          this.jumpsLeft = 2
          this.squash = 1.3
        }
      }
    }

    // Invincibility frames
    if (this.invTimer > 0) this.invTimer--

    // Coins
    for (const c of world.coins) {
      if (!c.collected && Math.abs(c.x - this.x) < 16 && Math.abs(c.y - this.y) < 16) {
        c.collected = true
        world.score += 10
        world.spawnParticles(c.x, c.y, '#fbbf24', 6)
      }
    }

    // Enemies
    for (const e of world.enemies) {
      if (!e.alive) continue
      if (this.invTimer > 0) continue
      const overlap = this.x < e.x + e.w && this.x + this.w > e.x &&
                      this.y < e.y + e.h && this.y + this.h > e.y
      if (overlap) {
        // Stomp from above
        if (this.vy > 0 && this.y + this.h < e.y + 8) {
          e.alive = false
          this.vy = JUMP_FORCE * 0.6
          world.score += 50
          world.spawnParticles(e.x + e.w/2, e.y, '#f87171', 8)
        } else {
          this.hp--
          this.invTimer = 90
          this.vx = this.x < e.x ? -4 : 4
          this.vy = -4
          world.spawnParticles(this.x + this.w/2, this.y + this.h/2, '#f87171', 5)
        }
      }
    }

    // Spikes
    for (const s of world.spikes) {
      if (this.invTimer > 0) continue
      if (this.x + this.w > s.x - 4 && this.x < s.x + 4 && this.y + this.h > s.y && this.y < s.y + 8) {
        this.hp--
        this.invTimer = 90
        this.vy = -5
      }
    }

    // Death conditions
    if (this.y > H + 32 || this.hp <= 0) {
      this.dead = true
    }

    // Run animation
    if (this.vx !== 0 && this.onGround) {
      this.runTimer++
      if (this.runTimer % 8 === 0) this.runFrame = (this.runFrame + 1) % 4
    } else {
      this.runFrame = 0
    }

    // Advance world scroll
    const targetScroll = this.x - W * 0.3
    world.scrollX += (targetScroll - world.scrollX) * 0.12
    world.distance = Math.max(world.distance, this.x | 0)
  }
}

// ─── World helpers ───────────────────────────────────────────
World.prototype.spawnParticles = function(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n + Math.random() * 0.5
    const speed = 1.5 + Math.random() * 2.5
    this.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1, decay: 0.05 + Math.random() * 0.04,
      color: color || COLORS.particle[Math.floor(Math.random() * COLORS.particle.length)],
      r: 2 + Math.random() * 2,
    })
  }
}

World.prototype.update = function() {
  this.distance++

  // Update enemies
  for (const e of this.enemies) {
    if (!e.alive) continue
    e.vy += GRAVITY
    e.x += e.vx
    e.y += e.vy
    for (const p of this.platforms) {
      if (e.x + e.w > p.x && e.x < p.x + p.w && e.vy >= 0 &&
          e.y + e.h > p.y && e.y + e.h < p.y + 12) {
        e.y = p.y - e.h; e.vy = 0; e.ground = true
      }
    }
    // Reverse at platform edges
    if (e.platRef && e.alive) {
      if (e.x < e.platRef.x || e.x + e.w > e.platRef.x + e.platRef.w) {
        e.vx *= -1
      }
    }
    if (e.hitTimer > 0) e.hitTimer--
  }

  // Update coins bob
  for (const c of this.coins) {
    c.bob += 0.06
  }

  // Update particles
  this.particles = this.particles.filter(p => p.life > 0)
  for (const p of this.particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay
  }

  // Generate more world
  if (this.genX - this.scrollX < W * 2) this.generateChunk()
}

// ─── Rendering ───────────────────────────────────────────────
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H)
  grad.addColorStop(0, COLORS.sky1)
  grad.addColorStop(1, COLORS.sky2)
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, W, H)

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)'
  const t = Date.now() / 1000
  for (let i = 0; i < 30; i++) {
    const sx = ((i * 137.5 + world.scrollX * 0.05) % W + W) % W
    const sy = (i * 73.1) % (H * 0.6)
    const br = 0.5 + 0.5 * Math.sin(t * 2 + i)
    ctx.globalAlpha = br * 0.5
    ctx.fillRect(sx, sy, 1, 1)
  }
  ctx.globalAlpha = 1
}

function drawPlatforms() {
  const sx = world.scrollX | 0
  for (const p of world.platforms) {
    const px = p.x - sx
    if (px + p.w < -10 || px > W + 10) continue
    ctx.fillStyle = COLORS.platform
    ctx.fillRect(px, p.y + 2, p.w, p.h)
    ctx.fillStyle = p.ground ? COLORS.groundTop : COLORS.platformTop
    ctx.fillRect(px, p.y, p.w, 3)
    // Subtle inner detail
    ctx.fillStyle = 'rgba(255,255,255,0.04)'
    ctx.fillRect(px + 2, p.y + 4, p.w - 4, p.h - 4)
  }
}

function drawSpikes() {
  const sx = world.scrollX | 0
  ctx.fillStyle = COLORS.spike
  for (const s of world.spikes) {
    const px = s.x - sx
    if (px < -20 || px > W + 20) continue
    ctx.beginPath()
    ctx.moveTo(px - 5, s.y + 8)
    ctx.lineTo(px, s.y)
    ctx.lineTo(px + 5, s.y + 8)
    ctx.closePath()
    ctx.fill()
  }
}

function drawCoins() {
  const sx = world.scrollX | 0
  for (const c of world.coins) {
    if (c.collected) continue
    const px = c.x - sx, py = c.y + Math.sin(c.bob) * 3
    if (px < -20 || px > W + 20) continue
    ctx.fillStyle = COLORS.coinGlow
    ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI * 2); ctx.fill()
    ctx.fillStyle = COLORS.coin
    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill()
    ctx.fillStyle = 'rgba(255,255,255,0.6)'
    ctx.beginPath(); ctx.arc(px - 1.5, py - 1.5, 1.5, 0, Math.PI * 2); ctx.fill()
  }
}

function drawEnemies() {
  const sx = world.scrollX | 0
  for (const e of world.enemies) {
    if (!e.alive) continue
    const px = (e.x - sx) | 0, py = e.y | 0
    if (px < -30 || px > W + 30) continue
    ctx.fillStyle = COLORS.enemy
    ctx.fillRect(px, py, e.w, e.h)
    // Eyes
    ctx.fillStyle = COLORS.enemyEye
    const eyeX = e.vx > 0 ? px + e.w - 4 : px + 2
    ctx.fillRect(eyeX, py + 4, 3, 3)
    // Horns
    ctx.fillStyle = '#c53030'
    ctx.fillRect(px + 2, py - 3, 3, 3)
    ctx.fillRect(px + e.w - 5, py - 3, 3, 3)
  }
}

function drawPlayer() {
  const p = player
  if (p.dead) return
  const px = (p.x - world.scrollX) | 0
  const py = p.y | 0

  const alpha = p.invTimer > 0 ? (Math.sin(p.invTimer * 0.5) * 0.5 + 0.5) : 1
  ctx.globalAlpha = alpha

  // Body with squash/stretch
  const sh = (p.h * p.squash) | 0
  const sy = py + p.h - sh

  ctx.fillStyle = COLORS.player
  ctx.fillRect(px, sy, p.w, sh)

  // Head
  ctx.fillRect(px + 1, py - 6, 10, 8)

  // Eye
  const eyeDir = keys['ArrowLeft'] || keys['a'] || keys['A'] ? -1 : 1
  ctx.fillStyle = COLORS.playerEye
  ctx.fillRect(px + (eyeDir > 0 ? 6 : 2), py - 4, 3, 3)

  // Feet / run animation
  ctx.fillStyle = COLORS.playerFeet
  const kick = Math.sin(p.runFrame * 1.57) * 3
  ctx.fillRect(px + 1, py + sh - 3, 4, 3 + kick)
  ctx.fillRect(px + 7, py + sh - 3, 4, 3 - kick)

  ctx.globalAlpha = 1
}

function drawParticles() {
  for (const p of world.particles) {
    ctx.globalAlpha = p.life
    ctx.fillStyle = p.color
    ctx.fillRect((p.x - world.scrollX) | 0, p.y | 0, p.r | 0, p.r | 0)
  }
  ctx.globalAlpha = 1
}

function drawHUD() {
  // Score
  document.getElementById('score-display').textContent = `SCORE: ${world.score}`

  // Health hearts
  let hearts = ''
  for (let i = 0; i < player.maxHp; i++) hearts += i < player.hp ? '♥' : '♡'
  document.getElementById('health-display').textContent = `HP: ${hearts}`

  // Distance meter (bottom right)
  ctx.fillStyle = 'rgba(255,255,255,0.15)'
  ctx.font = '8px "Courier New"'
  ctx.textAlign = 'right'
  ctx.fillText(`${(world.distance / 10) | 0}m`, W - 8, H - 6)
  ctx.textAlign = 'left'
}

// ─── Game State ──────────────────────────────────────────────
let world  = new World()
let player = new Player()
let state  = 'menu'  // 'menu' | 'playing' | 'dead'
let raf    = null

const screen   = document.getElementById('screen')
const screenSub = document.getElementById('screen-sub')
const startBtn = document.getElementById('start-btn')

startBtn.addEventListener('click', startGame)

function startGame() {
  world  = new World()
  player = new Player()
  state  = 'playing'
  screen.classList.add('hidden')
}

// ─── Main Loop ───────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H)
  drawBg()

  if (state === 'playing') {
    world.update()
    player.update(world)
    drawPlatforms()
    drawSpikes()
    drawCoins()
    drawEnemies()
    drawPlayer()
    drawParticles()
    drawHUD()

    if (player.dead) {
      state = 'dead'
      screen.classList.remove('hidden')
      screen.querySelector('h1').textContent = 'GAME OVER'
      screenSub.textContent = `Score: ${world.score} | Distance: ${(world.distance/10)|0}m`
      startBtn.textContent = 'TRY AGAIN'
    }
  } else {
    drawPlatforms()
    drawCoins()
    drawParticles()
  }

  // Restart key
  if (state === 'dead' && (keys['r'] || keys['R'])) startGame()

  raf = requestAnimationFrame(loop)
}

loop()
</script>
</body>
</html>
